<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>🍉 Fruit Ninja</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #fffdf7;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
    width: 100%; height: 100%;
    height: 100dvh;
    font-family: 'Nunito', 'Georgia', serif;
    position: fixed;
  }

  #container {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    height: 100dvh;
  }

  /* Decorative pastel background blobs */
  #bgCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    height: 100dvh;
    pointer-events: none;
    z-index: 0;
  }

  #webcam {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    opacity: 0.12;
    filter: saturate(0.3) brightness(1.1);
    z-index: 1;
    display: none;
  }

  #gameCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    height: 100dvh;
    z-index: 2;
  }

  /* ── UI ── */
  #ui {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 20px 32px;
    pointer-events: none;
    z-index: 10;
  }

  .score-box {
    background: #fff;
    border: 2.5px solid #f0e8d5;
    border-radius: 22px;
    padding: 10px 28px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.07);
  }
  .score-box .label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #b0a08a;
    font-weight: 700;
  }
  .score-box .value {
    font-size: 38px;
    font-weight: 900;
    color: #3a2e22;
    line-height: 1.1;
  }

  #lives {
    display: flex;
    gap: 6px;
    align-items: center;
    background: #fff;
    border: 2.5px solid #f0e8d5;
    border-radius: 50px;
    padding: 10px 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.07);
  }
  .flower { font-size: 28px; transition: transform 0.3s, filter 0.3s; }
  .flower.lost { filter: grayscale(1) opacity(0.35) brightness(0.8); transform: scale(0.8) rotate(-20deg); }

  /* ── Combo ── */
  #combo {
    position: absolute;
    top: 42%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 64px;
    font-weight: 900;
    color: #ff5533;
    text-shadow: 3px 3px 0 #ffddcc, 0 0 40px rgba(255,85,51,0.3);
    pointer-events: none;
    z-index: 15;
    opacity: 0;
    transition: opacity 0.35s;
    white-space: nowrap;
  }

  /* ── Status ── */
  #statusBar {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #fff;
    border: 2px solid #f0e8d5;
    border-radius: 30px;
    padding: 7px 22px;
    color: #b0a08a;
    font-size: 13px;
    font-weight: 700;
    z-index: 10;
    letter-spacing: 0.5px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  /* ── Overlay ── */
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(255, 253, 247, 0.92);
    backdrop-filter: blur(6px);
    z-index: 20;
    color: #3a2e22;
    text-align: center;
    gap: 16px;
  }

  #overlay .fruits-row {
    font-size: 52px;
    letter-spacing: 10px;
    animation: float 2s ease-in-out infinite alternate;
  }
  @keyframes float {
    from { transform: translateY(0); }
    to   { transform: translateY(-10px); }
  }

  #overlay h1 {
    font-size: 72px;
    font-weight: 900;
    color: #ff5533;
    text-shadow: 4px 4px 0 #ffddcc;
    line-height: 1;
  }

  #overlay p {
    font-size: 17px;
    color: #7a6a5a;
    max-width: 400px;
    line-height: 1.7;
  }

  #overlay .tagline {
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #c0a880;
    font-weight: 700;
  }

  #startBtn {
    margin-top: 8px;
    padding: 16px 52px;
    font-size: 20px;
    font-weight: 900;
    font-family: inherit;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #ff7744, #ff3355);
    color: #fff;
    cursor: pointer;
    box-shadow: 0 6px 0 #cc2233, 0 10px 30px rgba(255,60,60,0.3);
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 1px;
  }
  #startBtn:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #cc2233, 0 14px 36px rgba(255,60,60,0.35); }
  #startBtn:active { transform: translateY(3px); box-shadow: 0 3px 0 #cc2233, 0 6px 20px rgba(255,60,60,0.25); }

  /* decorative dots */
  .dot-row {
    display: flex; gap: 8px; justify-content: center;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; }

  /* ── Mobile responsive ── */
  @media (max-width: 480px) {
    /* HUD */
    #ui { padding: 8px 8px; gap: 4px; }
    .score-box { padding: 5px 10px; border-radius: 12px; }
    .score-box .label { font-size: 7px; letter-spacing: 1px; }
    .score-box .value { font-size: 18px; }
    #lives { padding: 5px 8px; gap: 3px; }
    .flower { font-size: 15px; }
    #timerVal { font-size: 16px !important; }
    #combo { font-size: 32px; }
    #statusBar { font-size: 10px; padding: 4px 12px; bottom: 8px; }

    /* Overlay */
    #overlay { justify-content: space-evenly; padding: 24px 20px; gap: 0; }
    #overlay .fruits-row { font-size: 34px; letter-spacing: 6px; white-space: nowrap; }
    #overlay h1 { font-size: 52px; white-space: nowrap; }
    #overlay p { font-size: 13px; line-height: 1.5; max-width: 300px; }
    #overlay .tagline { font-size: 11px; letter-spacing: 1.5px; }
    #btnMouse, #btnCamera { padding: 10px 18px !important; font-size: 13px !important; }
    #startBtn { padding: 14px 44px; font-size: 18px; margin-top: 0; }
  }
</style>
</head>
<body>
<div id="container">
  <canvas id="bgCanvas"></canvas>
  <video id="webcam" autoplay playsinline muted></video>
  <canvas id="gameCanvas"></canvas>

  <div id="ui">
    <div class="score-box">
      <div class="label">Score</div>
      <div class="value" id="scoreVal">0</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div id="lives">
        <span class="flower" id="h1">🌸</span>
        <span class="flower" id="h2">🌸</span>
        <span class="flower" id="h3">🌸</span>
      </div>
      <div class="score-box" style="padding:6px 22px">
        <div class="label">Time</div>
        <div class="value" id="timerVal" style="font-size:28px">2:00</div>
      </div>
    </div>
    <div class="score-box">
      <div class="label">Best</div>
      <div class="value" id="bestVal">0</div>
    </div>
  </div>

  <div id="combo"></div>
  <div id="statusBar">📷 Starting camera…</div>

  <div id="overlay">
    <div class="fruits-row">🍎 🍊 🍋 🍉 🍇</div>
    <h1>Fruit Ninja</h1>
    <p class="tagline">✦ Slice with your finger ✦</p>
    <p>Swipe through fruits to slice them!<br>
    🌟 <strong>Golden fruit</strong> = +50 pts &nbsp;|&nbsp; 💣 <strong>Bomb</strong> = Game Over!<br>
    Use your <strong>finger</strong> (camera) or <strong>touch</strong> (mobile)</p>
    <div class="dot-row">
      <div class="dot" style="background:#ff5533"></div>
      <div class="dot" style="background:#ffaa22"></div>
      <div class="dot" style="background:#44cc77"></div>
      <div class="dot" style="background:#4488ff"></div>
      <div class="dot" style="background:#aa44ff"></div>
    </div>
    <div style="display:flex;gap:12px;margin-top:4px">
      <button id="btnMouse"
        style="padding:12px 28px;font-size:15px;font-weight:800;font-family:Nunito,inherit;
               border:2.5px solid #ff5533;border-radius:50px;background:#fff;
               color:#ff5533;cursor:pointer;transition:all 0.15s">
        🖱️ Mouse / Touch
      </button>
      <button id="btnCamera"
        style="padding:12px 28px;font-size:15px;font-weight:800;font-family:Nunito,inherit;
               border:2.5px solid #ccc;border-radius:50px;background:#fff;
               color:#999;cursor:pointer;transition:all 0.15s">
        📷 Camera (Hand)
      </button>
    </div>
    <button id="startBtn">Start Slicing!</button>
    <div style="margin-top:14px;display:flex;align-items:center;justify-content:center;gap:8px">
      <span style="font-size:13px;color:#aaa;font-weight:700;letter-spacing:0.04em">🎮 Players visited:</span>
      <img src="https://hits.sh/gourisha-26.github.io/fruit-ninja.html.svg?style=flat-square&color=ff5533&labelColor=ffede8" alt="player count" style="height:20px;border-radius:6px;vertical-align:middle" />
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js" crossorigin="anonymous"></script>
<script>
// ── Canvas setup ──────────────────────────────────────────────────
const bgCanvas  = document.getElementById('bgCanvas');
const bgCtx     = bgCanvas.getContext('2d');
const canvas    = document.getElementById('gameCanvas');
const ctx       = canvas.getContext('2d');
const webcam    = document.getElementById('webcam');
const statusBar = document.getElementById('statusBar');
const overlay   = document.getElementById('overlay');
const startBtn  = document.getElementById('startBtn');
const scoreEl   = document.getElementById('scoreVal');
const bestEl    = document.getElementById('bestVal');
const comboEl   = document.getElementById('combo');

function resize() {
  const vv = window.visualViewport;
  const w = vv ? Math.round(vv.width)  : window.innerWidth;
  const h = vv ? Math.round(vv.height) : window.innerHeight;
  canvas.width  = bgCanvas.width  = w;
  canvas.height = bgCanvas.height = h;
  drawBackground();
}
resize();
window.addEventListener('resize', resize);
if (window.visualViewport) window.visualViewport.addEventListener('resize', resize);

// ── Pastel watercolor background ──────────────────────────────────
function drawBackground() {
  const w = bgCanvas.width, h = bgCanvas.height;
  bgCtx.clearRect(0, 0, w, h);

  // cream base
  bgCtx.fillStyle = '#fffdf7';
  bgCtx.fillRect(0, 0, w, h);

  // soft pastel blobs
  const blobs = [
    { x: w*0.08, y: h*0.12, r: w*0.22, color: 'rgba(255,220,200,0.35)' },
    { x: w*0.88, y: h*0.15, r: w*0.18, color: 'rgba(200,240,200,0.3)'  },
    { x: w*0.5,  y: h*0.9,  r: w*0.25, color: 'rgba(200,220,255,0.28)' },
    { x: w*0.15, y: h*0.75, r: w*0.15, color: 'rgba(255,240,180,0.3)'  },
    { x: w*0.82, y: h*0.7,  r: w*0.17, color: 'rgba(255,200,230,0.3)'  },
  ];
  blobs.forEach(b => {
    const g = bgCtx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
    g.addColorStop(0, b.color);
    g.addColorStop(1, 'rgba(255,255,255,0)');
    bgCtx.beginPath();
    bgCtx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    bgCtx.fillStyle = g;
    bgCtx.fill();
  });

  // subtle grid dots
  bgCtx.fillStyle = 'rgba(200,185,165,0.18)';
  for (let x = 40; x < w; x += 48) {
    for (let y = 40; y < h; y += 48) {
      bgCtx.beginPath();
      bgCtx.arc(x, y, 2, 0, Math.PI*2);
      bgCtx.fill();
    }
  }
}

// ── Fruit definitions ─────────────────────────────────────────────
const FRUITS = [
  {
    name:'Apple', stemColor:'#5d4037', leafColor:'#4caf50',
    body:'#e53935', bodyDark:'#b71c1c', shine:'#ff8a80',
    flesh:'#ffccbc', seed:'#3e2723',
    draw(ctx,x,y,r,rot) { drawRoundFruit(ctx,x,y,r,rot,this); },
  },
  {
    name:'Orange', stemColor:'#5d4037', leafColor:'#66bb6a',
    body:'#fb8c00', bodyDark:'#e65100', shine:'#ffe082',
    flesh:'#fff3e0', seed:'#4e342e',
    draw(ctx,x,y,r,rot) { drawCitrusFruit(ctx,x,y,r,rot,this); },
  },
  {
    name:'Lemon', stemColor:'#5d4037', leafColor:'#aed581',
    body:'#fdd835', bodyDark:'#f9a825', shine:'#fff9c4',
    flesh:'#fffde7', seed:'#827717',
    draw(ctx,x,y,r,rot) { drawLemon(ctx,x,y,r,rot,this); },
  },
  {
    name:'Watermelon', stemColor:'#33691e', leafColor:'#81c784',
    body:'#388e3c', bodyDark:'#1b5e20', shine:'#a5d6a7',
    flesh:'#ef5350', seed:'#1a1a1a',
    draw(ctx,x,y,r,rot) { drawWatermelon(ctx,x,y,r,rot,this); },
  },
  {
    name:'Grape', stemColor:'#6d4c41', leafColor:'#ce93d8',
    body:'#7b1fa2', bodyDark:'#4a148c', shine:'#e1bee7',
    flesh:'#ce93d8', seed:'#311b92',
    draw(ctx,x,y,r,rot) { drawGrape(ctx,x,y,r,rot,this); },
  },
  {
    name:'Peach', stemColor:'#6d4c41', leafColor:'#a5d6a7',
    body:'#ff8a65', bodyDark:'#bf360c', shine:'#ffccbc',
    flesh:'#fff9c4', seed:'#5d4037',
    draw(ctx,x,y,r,rot) { drawPeach(ctx,x,y,r,rot,this); },
  },
  {
    name:'Kiwi', stemColor:'#4e342e', leafColor:'#8d6e63',
    body:'#558b2f', bodyDark:'#33691e', shine:'#dcedc8',
    flesh:'#8bc34a', seed:'#1b1b1b',
    draw(ctx,x,y,r,rot) { drawKiwi(ctx,x,y,r,rot,this); },
  },
];

// ── Illustrative fruit drawers ────────────────────────────────────
function fruitGrad(ctx, x, y, r, f) {
  return f.body; // flat color — no gradient, much faster
}
function drawStem(ctx, x, y, r, f) {
  ctx.beginPath();
  ctx.moveTo(x, y - r);
  ctx.quadraticCurveTo(x + r*0.35, y - r*1.4, x + r*0.18, y - r*1.65);
  ctx.strokeStyle = f.stemColor;
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.stroke();
  // leaf
  ctx.beginPath();
  ctx.moveTo(x + r*0.18, y - r*1.45);
  ctx.quadraticCurveTo(x + r*0.8, y - r*1.6, x + r*0.55, y - r*1.15);
  ctx.quadraticCurveTo(x + r*0.25, y - r*1.25, x + r*0.18, y - r*1.45);
  ctx.fillStyle = f.leafColor;
  ctx.fill();
  // leaf vein
  ctx.beginPath();
  ctx.moveTo(x + r*0.18, y - r*1.45);
  ctx.quadraticCurveTo(x + r*0.5, y - r*1.38, x + r*0.55, y - r*1.15);
  ctx.strokeStyle = 'rgba(0,0,0,0.12)';
  ctx.lineWidth = 1;
  ctx.stroke();
}
function drawShine(ctx, x, y, r) {
  ctx.beginPath();
  ctx.ellipse(x - r*0.28, y - r*0.28, r*0.2, r*0.12, -0.6, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x - r*0.14, y - r*0.42, r*0.08, r*0.05, -0.4, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fill();
}
function fruitShadow(ctx, x, y, r) {
  ctx.beginPath();
  ctx.ellipse(x+5, y+r*0.6, r*0.85, r*0.45, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.10)';
  ctx.fill();
}

function drawRoundFruit(ctx, x, y, r, rot, f) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
  fruitShadow(ctx, 0, 0, r);
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2);
  ctx.fillStyle = fruitGrad(ctx, 0, 0, r, f);
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.08)'; ctx.lineWidth = 1.5; ctx.stroke();
  // texture lines
  ctx.beginPath(); ctx.moveTo(-r*0.05, -r*0.9); ctx.quadraticCurveTo(-r*0.35, -r*0.1, -r*0.08, r*0.85);
  ctx.strokeStyle = 'rgba(0,0,0,0.07)'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(r*0.05, -r*0.9); ctx.quadraticCurveTo(r*0.35, -r*0.1, r*0.08, r*0.85);
  ctx.strokeStyle = 'rgba(0,0,0,0.06)'; ctx.lineWidth = 1; ctx.stroke();
  drawShine(ctx, 0, 0, r);
  ctx.restore();
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
  drawStem(ctx, 0, 0, r, f);
  ctx.restore();
}

function drawCitrusFruit(ctx, x, y, r, rot, f) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
  fruitShadow(ctx, 0, 0, r);
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2);
  ctx.fillStyle = fruitGrad(ctx, 0, 0, r, f); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.08)'; ctx.lineWidth = 1.5; ctx.stroke();
  // peel texture bumps
  for (let i = 0; i < 8; i++) {
    const a = (Math.PI*2/8)*i;
    const bx = Math.cos(a)*r*0.65, by = Math.sin(a)*r*0.65;
    ctx.beginPath(); ctx.arc(bx, by, r*0.08, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.06)'; ctx.fill();
  }
  drawShine(ctx, 0, 0, r);
  ctx.restore();
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
  drawStem(ctx, 0, 0, r, f);
  ctx.restore();
}

function drawLemon(ctx, x, y, r, rot, f) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
  fruitShadow(ctx, 0, 0, r);
  ctx.beginPath();
  ctx.moveTo(0, -r);
  ctx.bezierCurveTo(r*1.1, -r, r*1.1, r, 0, r);
  ctx.bezierCurveTo(-r*1.1, r, -r*1.1, -r, 0, -r);
  ctx.fillStyle = fruitGrad(ctx, 0, 0, r, f); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.07)'; ctx.lineWidth = 1.5; ctx.stroke();
  // tip nub
  ctx.beginPath(); ctx.arc(0, r*0.95, r*0.12, 0, Math.PI*2);
  ctx.fillStyle = f.bodyDark; ctx.fill();
  drawShine(ctx, 0, 0, r);
  ctx.restore();
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
  drawStem(ctx, 0, 0, r, f);
  ctx.restore();
}

function drawWatermelon(ctx, x, y, r, rot, f) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
  fruitShadow(ctx, 0, 0, r);
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2);
  ctx.fillStyle = '#388e3c'; ctx.fill();
  // stripes
  for (let i = 0; i < 5; i++) {
    const a = (Math.PI*2/5)*i;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.arc(0,0,r,a,a+0.28);
    ctx.closePath();
    ctx.fillStyle = 'rgba(255,255,255,0.12)'; ctx.fill();
  }
  ctx.strokeStyle = 'rgba(0,0,0,0.1)'; ctx.lineWidth = 1.5; ctx.stroke();
  drawShine(ctx, 0, 0, r);
  ctx.restore();
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
  drawStem(ctx, 0, 0, r, f);
  ctx.restore();
}

function drawGrape(ctx, x, y, r, rot, f) {
  // bunch of grapes
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
  const positions = [
    [0,-r*0.55,r*0.45],[r*0.5,-r*0.2,r*0.45],[-r*0.5,-r*0.2,r*0.45],
    [r*0.28,r*0.3,r*0.45],[-r*0.28,r*0.3,r*0.45],[0,r*0.75,r*0.4],
  ];
  positions.forEach(([gx,gy,gr]) => {
    ctx.beginPath(); ctx.arc(gx, gy, gr, 0, Math.PI*2);
    ctx.fillStyle = f.body; ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.07)'; ctx.lineWidth = 1; ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(gx-gr*0.25, gy-gr*0.25, gr*0.15, gr*0.09, -0.5, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.fill();
  });
  drawStem(ctx, 0, -r*1.05, r*0.3, f);
  ctx.restore();
}

function drawPeach(ctx, x, y, r, rot, f) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
  fruitShadow(ctx, 0, 0, r);
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2);
  ctx.fillStyle = f.body; ctx.fill();
  // crease
  ctx.beginPath(); ctx.moveTo(0,-r*0.9); ctx.quadraticCurveTo(r*0.08, 0, 0, r*0.85);
  ctx.strokeStyle = 'rgba(191,54,12,0.25)'; ctx.lineWidth = 2; ctx.stroke();
  ctx.strokeStyle = 'rgba(0,0,0,0.06)'; ctx.lineWidth = 1.5; ctx.stroke();
  drawShine(ctx, 0, 0, r);
  ctx.restore();
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
  drawStem(ctx, 0, 0, r, f);
  ctx.restore();
}

function drawKiwi(ctx, x, y, r, rot, f) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
  fruitShadow(ctx, 0, 0, r);
  // fuzzy brown body
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2);
  ctx.fillStyle = '#8d6e63'; ctx.fill();
  // fuzz texture (batched into one path)
  ctx.beginPath();
  for (let i = 0; i < 12; i++) {
    const a = (Math.PI*2/12)*i;
    ctx.moveTo(Math.cos(a)*r*0.82, Math.sin(a)*r*0.82);
    ctx.lineTo(Math.cos(a)*r*0.97, Math.sin(a)*r*0.97);
  }
  ctx.strokeStyle = 'rgba(62,35,20,0.3)'; ctx.lineWidth = 1; ctx.stroke();
  ctx.strokeStyle = 'rgba(0,0,0,0.1)'; ctx.lineWidth = 1.5; ctx.stroke();
  drawShine(ctx, 0, 0, r);
  ctx.restore();
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
  drawStem(ctx, 0, 0, r, f);
  ctx.restore();
}

// sliced half — illustrative inner flesh
function drawSlicedHalf(ctx, x, y, r, f, side, rot, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);
  ctx.rotate(rot);

  ctx.beginPath();
  if (side === 'L') { ctx.arc(0,0,r,Math.PI/2,Math.PI*1.5); ctx.lineTo(0,-r); }
  else              { ctx.arc(0,0,r,-Math.PI/2,Math.PI/2);  ctx.lineTo(0,r);  }
  ctx.closePath();

  ctx.fillStyle = f.body; ctx.fill();

  // inner flesh ring
  ctx.beginPath();
  if (side === 'L') { ctx.arc(0,0,r*0.82,Math.PI/2,Math.PI*1.5); ctx.lineTo(0,-r*0.82); }
  else              { ctx.arc(0,0,r*0.82,-Math.PI/2,Math.PI/2);  ctx.lineTo(0,r*0.82);  }
  ctx.closePath();
  ctx.fillStyle = f.flesh; ctx.fill();

  // watermelon gets red inside with seeds
  if (f.name === 'Watermelon') {
    ctx.beginPath();
    if (side === 'L') { ctx.arc(0,0,r*0.68,Math.PI/2,Math.PI*1.5); ctx.lineTo(0,-r*0.68); }
    else              { ctx.arc(0,0,r*0.68,-Math.PI/2,Math.PI/2);  ctx.lineTo(0,r*0.68);  }
    ctx.closePath();
    ctx.fillStyle = '#ef5350'; ctx.fill();
  }

  // seeds
  const seedsX = side === 'L' ? -r*0.28 : r*0.22;
  for (let i = 0; i < 3; i++) {
    const sy = -r*0.38 + i * r*0.36;
    ctx.beginPath(); ctx.ellipse(seedsX, sy, 3, 5.5, 0.15, 0, Math.PI*2);
    ctx.fillStyle = f.seed; ctx.fill();
  }

  // juice shine line
  ctx.beginPath();
  ctx.moveTo(0, side==='L'?-r*0.8:-r*0.8);
  ctx.lineTo(0, side==='L'?r*0.8:r*0.8);
  ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1.5; ctx.stroke();

  ctx.strokeStyle = 'rgba(0,0,0,0.1)'; ctx.lineWidth = 1; ctx.stroke();
  ctx.restore();
}

// ── Bomb draw ─────────────────────────────────────────────────────
const BOMB = {
  name:'Bomb', body:'#222', bodyDark:'#000', shine:'#666', seed:'#000', flesh:'#333',
  draw(ctx, x, y, r, rot) {
    ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
    // shadow
    ctx.beginPath(); ctx.ellipse(4,r*0.6,r*0.85,r*0.45,0,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,0.12)'; ctx.fill();
    // body
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
    ctx.fillStyle='#222'; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1.5; ctx.stroke();
    // shine
    ctx.beginPath(); ctx.ellipse(-r*0.28,-r*0.28,r*0.2,r*0.12,-0.6,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.fill();
    // fuse cord
    ctx.beginPath(); ctx.moveTo(r*0.1,-r);
    ctx.quadraticCurveTo(r*0.5,-r*1.4,r*0.3,-r*1.7);
    ctx.strokeStyle='#8B6914'; ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.stroke();
    // spark
    const sparks=[[-2,-2],[2,-1],[-1,2],[2,2],[-3,0]];
    sparks.forEach(([sx,sy])=>{
      ctx.beginPath(); ctx.arc(r*0.3+sx*2,-(r*1.7)+sy*2,2,0,Math.PI*2);
      ctx.fillStyle=Math.random()<0.5?'#ffdd00':'#ff8800'; ctx.fill();
    });
    ctx.restore();
  }
};

// ── Sparkling Star draw (lightweight — no per-frame gradients) ────
let _starAnim = 0;
function drawStarPath(ctx, cx, cy, or, ir, pts) {
  ctx.beginPath();
  for (let i = 0; i < pts*2; i++) {
    const a = (Math.PI/pts)*i - Math.PI/2;
    const rd = i%2===0 ? or : ir;
    i===0 ? ctx.moveTo(cx+Math.cos(a)*rd, cy+Math.sin(a)*rd)
          : ctx.lineTo(cx+Math.cos(a)*rd, cy+Math.sin(a)*rd);
  }
  ctx.closePath();
}
const GOLDEN = {
  name:'Golden', body:'#FFD700', bodyDark:'#B8860B', shine:'#fffacd', seed:'#fff', flesh:'#fffde7',
  draw(ctx, x, y, r, rot) {
    _starAnim += 0.05;
    ctx.save(); ctx.translate(x, y); ctx.rotate(rot + _starAnim * 0.35);

    // soft glow — solid fill circle, no gradient
    ctx.beginPath(); ctx.arc(0, 0, r*1.7, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,220,30,0.18)'; ctx.fill();

    // star body — flat gold fill
    drawStarPath(ctx, 0, 0, r, r*0.42, 5);
    ctx.fillStyle = '#FFD700'; ctx.fill();
    ctx.strokeStyle = '#B8860B'; ctx.lineWidth = 1.5; ctx.stroke();

    // inner lighter star
    drawStarPath(ctx, 0, 0, r*0.55, r*0.22, 5);
    ctx.fillStyle = '#fff9a0'; ctx.fill();

    // 4 static sparkle rays
    ctx.save(); ctx.rotate(_starAnim * 0.8);
    for (let i = 0; i < 4; i++) {
      const a = (Math.PI/2)*i;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*r*1.1, Math.sin(a)*r*1.1);
      ctx.lineTo(Math.cos(a)*r*1.7, Math.sin(a)*r*1.7);
      ctx.strokeStyle = 'rgba(255,240,80,0.75)';
      ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.stroke();
    }
    ctx.restore();

    // shine dot
    ctx.beginPath(); ctx.arc(-r*0.2, -r*0.22, r*0.14, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.fill();
    ctx.restore();
  }
};

// ── Helpers ───────────────────────────────────────────────────────
function darken(hex,a){
  let c=parseInt(hex.slice(1),16),r=((c>>16)&0xff)*(1-a),g=((c>>8)&0xff)*(1-a),b=(c&0xff)*(1-a);
  return `rgb(${r|0},${g|0},${b|0})`;
}
function lighten(hex,a){
  let c=parseInt(hex.slice(1),16),r=Math.min(255,((c>>16)&0xff)+255*a),g=Math.min(255,((c>>8)&0xff)+255*a),b=Math.min(255,(c&0xff)+255*a);
  return `rgb(${r|0},${g|0},${b|0})`;
}

// ── Sound engine (Web Audio API — no external files) ─────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function resumeAudio() { if (audioCtx.state === 'suspended') audioCtx.resume(); }

function playSplat(isGold=false) {
  resumeAudio();
  const now = audioCtx.currentTime;
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(isGold ? 1200 : 420, now);
  osc.frequency.exponentialRampToValueAtTime(isGold ? 2000 : 120, now + 0.15);
  gain.gain.setValueAtTime(0.4, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(now); osc.stop(now + 0.2);
}

function playBoom() {
  resumeAudio();
  const now = audioCtx.currentTime;
  const len = audioCtx.sampleRate * 0.5;
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const d   = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/len, 2) * 0.8;
  const src = audioCtx.createBufferSource();
  const flt = audioCtx.createBiquadFilter();
  flt.type = 'lowpass'; flt.frequency.value = 180;
  src.buffer = buf; src.connect(flt); flt.connect(audioCtx.destination);
  src.start(now);
}

function playCountdownBeep(last=false) {
  resumeAudio();
  const now = audioCtx.currentTime;
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.frequency.value = last ? 880 : 660;
  gain.gain.setValueAtTime(0.3, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(now); osc.stop(now + 0.12);
}

// ── Mode ──────────────────────────────────────────────────────────
let inputMode = 'mouse';
function setMode(m) {
  inputMode = m;
  const active  = 'border-color:#ff5533;color:#ff5533;background:#fff0ee';
  const inactive = 'border-color:#ccc;color:#999;background:#fff';
  document.getElementById('btnMouse').style.cssText  += m==='mouse'  ? active : inactive;
  document.getElementById('btnCamera').style.cssText += m==='camera' ? active : inactive;
  if (m === 'mouse') {
    fingerPos = null; prevFingerPos = null; slashTrail = [];
    webcam.style.display = 'none';
    statusBar.textContent = '🖱️ Move your mouse to slice — press Start!';
  }
  if (m === 'camera') {
    fingerPos = null; prevFingerPos = null; slashTrail = [];
    webcam.style.display = 'block';
    startCamera(); // lazy-init only when chosen
  }
}

// ── Game state ────────────────────────────────────────────────────
let score=0, best=parseInt(localStorage.getItem('fruitNinjaBest')||'0'), lives=3, gameRunning=false;
let fruits=[], particles=[], popups=[], slashTrail=[];
let fingerPos=null, prevFingerPos=null;
let comboCount=0, comboTimer=null, lastSpawn=0;
const GAME_DURATION = 60;
let timeLeft=GAME_DURATION, lastTick=0, lastCountdownBeep=-1;

// ── Particles ─────────────────────────────────────────────────────
const MAX_PARTICLES = 80;
function spawnParticles(x, y, f) {
  if (particles.length > MAX_PARTICLES) return; // skip if already busy
  for (let i = 0; i < 12; i++) {
    const a = (Math.PI*2/12)*i;
    const s = 2.5 + Math.random()*5;
    particles.push({x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-2,
      r:3+Math.random()*4, color:Math.random()<0.5?f.body:f.shine, life:1, decay:0.03+Math.random()*0.02});
  }
  for (let i = 0; i < 5; i++) {
    particles.push({x, y, vx:(Math.random()-0.5)*10, vy:-Math.random()*8-1,
      r:5+Math.random()*6, color:f.body+'99', life:1, decay:0.04+Math.random()*0.02, blob:true});
  }
}

// ── Score popups ──────────────────────────────────────────────────
function scorePopup(x, y, text, color='#ff5533') {
  popups.push({x, y, text, color, life:1, vy:-2.2});
}

// ── Slash trail ───────────────────────────────────────────────────
function drawSlash() {
  if (slashTrail.length < 2) return;
  ctx.save();
  for (let i = 1; i < slashTrail.length; i++) {
    const t = i / slashTrail.length;
    const p = slashTrail[i-1], q = slashTrail[i];
    // colored ribbon
    ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y);
    ctx.strokeStyle = `hsla(${200+t*60},80%,70%,${t*0.7})`;
    ctx.lineWidth = t * 16; ctx.lineCap='round'; ctx.stroke();
    // white core
    ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y);
    ctx.strokeStyle = `rgba(255,255,255,${t*0.9})`;
    ctx.lineWidth = t * 5; ctx.stroke();
  }
  ctx.restore();
}

// ── Spawn ─────────────────────────────────────────────────────────
function spawnFruit() {
  const roll = Math.random();
  const type = roll < 0.10 ? BOMB
             : roll < 0.18 ? GOLDEN
             : FRUITS[Math.floor(Math.random()*FRUITS.length)];
  const r = 28 + Math.random()*20;

  // tier must be defined before it's used
  const tier = Math.min(Math.floor(score / 80), 3);
  const t = tier / 3;
  const tierLabels = ['🌱 Easy','🌿 Medium','🔥 Fast','⚡ Blazing'];
  statusBar.textContent = tierLabels[tier];

  // tier0 → center 20%, tier3 → full 80% width
  const spread  = 0.20 + t * 0.60;
  const startX  = (canvas.width - canvas.width * spread) / 2;
  const x       = startX + Math.random() * (canvas.width * spread);

  // all tiers fly 85–95% of screen height
  const targetH = canvas.height * (0.85 + Math.random() * 0.10);
  const baseVy  = Math.sqrt(targetH * 2 * 0.33);
  const baseVx  = 2 + t * 3;
  fruits.push({
    x, y:canvas.height+r+10,
    vx:(Math.random()-0.5)*baseVx*2, vy:-baseVy,
    r, type, rotation:0, rotSpeed:(Math.random()-0.5)*0.06,
    sliced:false, slicedTimer:1,
    lx:0, ly:0, rx:0, ry:0,
    lvx:0, lvy:0, rvx:0, rvy:0,
    lrot:0, rrot:0, missed:false,
  });
}

// ── Slice check ───────────────────────────────────────────────────
function checkSlice(fr) {
  if (fr.sliced || !fingerPos || !prevFingerPos) return;
  const dx=fingerPos.x-prevFingerPos.x, dy=fingerPos.y-prevFingerPos.y;
  const fx=fr.x-prevFingerPos.x,       fy=fr.y-prevFingerPos.y;
  const len2=dx*dx+dy*dy; if(!len2) return;
  let t=Math.max(0,Math.min(1,(fx*dx+fy*dy)/len2));
  const cx=prevFingerPos.x+t*dx-fr.x, cy=prevFingerPos.y+t*dy-fr.y;
  if (cx*cx+cy*cy < fr.r*fr.r) sliceFruit(fr);
}

function sliceFruit(fr) {
  resumeAudio();
  fr.sliced = true;
  fr.slicedTimer = 1;
  fr.lx=fr.x; fr.ly=fr.y; fr.rx=fr.x; fr.ry=fr.y;
  fr.lvx=-3-Math.random()*2; fr.lvy=-2;
  fr.rvx= 3+Math.random()*2; fr.rvy=-2;
  fr.lrot=fr.rotation; fr.rrot=fr.rotation;

  // 💣 Bomb — instant game over
  if (fr.type === BOMB) {
    playBoom();
    spawnBombParticles(fr.x, fr.y);
    scorePopup(fr.x, fr.y-50, '💣 BOOM!', '#ff2200');
    setTimeout(() => endGame(), 600);
    return;
  }

  spawnParticles(fr.x, fr.y, fr.type);

  // ⭐ Golden star — 50 points, burst into sparkles (no halves)
  if (fr.type === GOLDEN) {
    playSplat(true);
    fr.slicedTimer = 0; // skip sliced-halves rendering
    score += 50;
    scoreEl.textContent = score;
    if (score > best) { best = score; bestEl.textContent = best; localStorage.setItem('fruitNinjaBest', best); }
    showCombo('⭐ STAR! +50');
    scorePopup(fr.x, fr.y-50, '+50', '#FFD700');
    // golden sparkle burst
    for (let i = 0; i < 28; i++) {
      const a = (Math.PI*2/28)*i;
      const s = 3 + Math.random()*8;
      particles.push({x:fr.x, y:fr.y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-2,
        r:3+Math.random()*5, color:Math.random()<0.5?'#FFD700':'#fffacd', life:1, decay:0.022+Math.random()*0.02});
    }
    return;
  }

  playSplat();
  score += 10;
  scoreEl.textContent = score;
  if (score > best) { best = score; bestEl.textContent = best; localStorage.setItem('fruitNinjaBest', best); }

  comboCount++;
  clearTimeout(comboTimer);
  comboTimer = setTimeout(() => { comboCount=0; }, 1200);

  if (comboCount >= 3) {
    const bonus = comboCount * 15;
    score += bonus; scoreEl.textContent = score;
    if (score > best) { best = score; bestEl.textContent = best; localStorage.setItem('fruitNinjaBest', best); }
    const label = comboCount >= 6 ? '🔥 INSANE' : comboCount >= 5 ? '⚡ AMAZING' : comboCount >= 4 ? '💥 GREAT' : '✨ COMBO';
    showCombo(`${label} ×${comboCount}!`);
    scorePopup(fr.x, fr.y-50, `+${10+bonus}`, '#ff5533');
  } else {
    scorePopup(fr.x, fr.y-40, '+10', '#44aa77');
  }
}

function spawnBombParticles(x, y) {
  for (let i = 0; i < 30; i++) {
    const a = (Math.PI*2/30)*i;
    const s = 4 + Math.random()*8;
    particles.push({x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-3,
      r:4+Math.random()*6, color:Math.random()<0.5?'#ff4400':'#ffaa00', life:1, decay:0.02+Math.random()*0.02});
  }
  // shockwave ring stored as special particle
  particles.push({x, y, vx:0, vy:0, r:10, maxR:120, color:'rgba(255,100,0,0.6)', life:1, decay:0.04, shockwave:true});
}

function showCombo(txt) {
  comboEl.textContent = txt;
  comboEl.style.opacity = '1';
  setTimeout(() => { comboEl.style.opacity='0'; }, 950);
}

// ── Hearts ────────────────────────────────────────────────────────
function updateHearts() {
  ['h1','h2','h3'].forEach((id,i) => {
    const el = document.getElementById(id);
    el.textContent = i < lives ? '🌸' : '🥀';
    el.className = 'flower' + (i >= lives ? ' lost' : '');
  });
}

// ── Main loop ─────────────────────────────────────────────────────
function gameLoop(ts) {
  if (!gameRunning) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // ── timer ──
  if (lastTick === 0) lastTick = ts;
  const elapsed = (ts - lastTick) / 1000;
  lastTick = ts;
  timeLeft = Math.max(0, timeLeft - elapsed);
  const mins = Math.floor(timeLeft / 60);
  const secs = Math.floor(timeLeft % 60);
  const timerEl = document.getElementById('timerVal');
  timerEl.textContent = `${mins}:${secs.toString().padStart(2,'0')}`;
  timerEl.style.color = timeLeft <= 10 ? '#ff3333' : '#3a2e22';

  // last 10 sec countdown beep (once per second)
  if (timeLeft <= 10 && timeLeft > 0) {
    const beepSec = Math.ceil(timeLeft);
    if (beepSec !== lastCountdownBeep) {
      lastCountdownBeep = beepSec;
      playCountdownBeep(beepSec === 1);
    }
  }

  // draw big countdown number (last 10 sec, doesn't block fruits)
  if (timeLeft <= 10 && timeLeft > 0) {
    const n = Math.ceil(timeLeft);
    const pulse = 0.7 + 0.3 * Math.sin(ts * 0.015);
    ctx.save();
    ctx.globalAlpha = 0.18 * pulse;
    ctx.font = `900 ${canvas.height * 0.55}px Nunito,Georgia`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff3333';
    ctx.fillText(n, canvas.width/2, canvas.height*0.62);
    ctx.restore();
  }

  if (timeLeft <= 0) { endGame('time'); return; }

  // spawn
  const interval = Math.max(700, 1600 - score*2);
  if (ts - lastSpawn > interval) {
    spawnFruit();
    if (score > 60 && Math.random()<0.45) spawnFruit();
    lastSpawn = ts;
  }

  // fruits
  for (let i=fruits.length-1; i>=0; i--) {
    const fr = fruits[i];
    if (!fr.sliced) {
      fr.vy += 0.33; fr.x += fr.vx; fr.y += fr.vy;
      fr.rotation += fr.rotSpeed;
      checkSlice(fr);
      fr.type.draw(ctx, fr.x, fr.y, fr.r, fr.rotation);

      if (fr.y > canvas.height+80 && !fr.missed) {
        fr.missed = true;
        // don't penalise during a lag spike (frame took >200ms)
        if (fr.type !== BOMB && fr.type !== GOLDEN && elapsed < 0.2) {
          lives--; updateHearts();
          for (let j=0;j<4;j++) particles.push({
            x:fr.x, y:canvas.height-20,
            vx:(Math.random()-0.5)*6, vy:-Math.random()*4,
            r:3+Math.random()*3, color:'#ffccaa', life:1, decay:0.06
          });
          if (lives<=0) { endGame('lives'); return; }
        }
      }
      if (fr.y > canvas.height+170) fruits.splice(i,1);
    } else {
      // halves
      fr.slicedTimer -= 0.014;
      fr.lvy += 0.4; fr.rvy += 0.4;
      fr.lx += fr.lvx; fr.ly += fr.lvy;
      fr.rx += fr.rvx; fr.ry += fr.rvy;
      fr.lrot += 0.07; fr.rrot -= 0.07;
      const a = Math.max(0, fr.slicedTimer);
      drawSlicedHalf(ctx, fr.lx, fr.ly, fr.r, fr.type, 'L', fr.lrot, a);
      drawSlicedHalf(ctx, fr.rx, fr.ry, fr.r, fr.type, 'R', fr.rrot, a);
      if (fr.slicedTimer<=0 || fr.ly>canvas.height+120) fruits.splice(i,1);
    }
  }

  // particles
  for (let i=particles.length-1;i>=0;i--) {
    const p=particles[i];
    p.life-=p.decay;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.save(); ctx.globalAlpha=p.life;
    if (p.shockwave) {
      p.r += 8;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.strokeStyle=p.color; ctx.lineWidth=3*(1-p.r/p.maxR+0.1); ctx.stroke();
    } else {
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.28;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*(p.blob?p.life:1),0,Math.PI*2);
      ctx.fillStyle=p.color; ctx.fill();
    }
    ctx.restore();
  }

  // popups
  for (let i=popups.length-1;i>=0;i--) {
    const p=popups[i];
    p.y+=p.vy; p.life-=0.022;
    if(p.life<=0){popups.splice(i,1);continue;}
    ctx.save(); ctx.globalAlpha=p.life;
    ctx.font=`900 22px Nunito,Georgia`; ctx.textAlign='center';
    ctx.fillStyle=p.color; ctx.fillText(p.text,p.x,p.y);
    ctx.restore();
  }

  // finger cursor — simple, no gradients
  if (fingerPos) {
    ctx.save();
    ctx.beginPath(); ctx.arc(fingerPos.x,fingerPos.y,16,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,85,51,0.6)'; ctx.lineWidth=2.5; ctx.stroke();
    ctx.beginPath(); ctx.arc(fingerPos.x,fingerPos.y,5,0,Math.PI*2);
    ctx.fillStyle='rgba(255,85,51,0.9)'; ctx.fill();
    ctx.restore();
  }

  drawSlash();
  requestAnimationFrame(gameLoop);
}

// ── Start / End ───────────────────────────────────────────────────
const COUNTER_URL = 'https://api.counterapi.dev/v1/fruit-ninja-gourisha/players';

async function fetchPlayerCount() {
  try {
    const res = await fetch(COUNTER_URL);
    const data = await res.json();
    const el = document.getElementById('playerCount');
    if (el && data.count != null) el.textContent = `🎮 ${data.count.toLocaleString()} players have played!`;
    else if (el) el.textContent = '';
  } catch(e) {
    const el = document.getElementById('playerCount');
    if (el) el.textContent = '';
  }
}

async function incrementPlayerCount() {
  try {
    const res = await fetch(COUNTER_URL + '/up');
    const data = await res.json();
    const el = document.getElementById('playerCount');
    if (el && data.count != null) el.textContent = `🎮 ${data.count.toLocaleString()} players have played!`;
  } catch(e) {}
}

fetchPlayerCount();

function startGame() {
  resumeAudio();
  incrementPlayerCount();
  score=0; lives=3; gameRunning=true;
  fruits=[]; particles=[]; popups=[]; slashTrail=[]; comboCount=0; lastSpawn=0;
  prevFingerPos=null;
  timeLeft=GAME_DURATION; lastTick=0; lastCountdownBeep=-1;
  scoreEl.textContent='0'; updateHearts();
  document.getElementById('timerVal').textContent='1:30';
  document.getElementById('timerVal').style.color='#3a2e22';
  overlay.style.display='none';
  requestAnimationFrame(gameLoop);
}

function endGame(reason='lives') {
  gameRunning=false;
  const isTimeUp = reason === 'time';
  overlay.style.display='flex';
  overlay.innerHTML=`
    <div class="fruits-row">${isTimeUp ? '⏰' : '💣'} </div>
    <h1>${isTimeUp ? 'Time\'s Up!' : 'Game Over!'}</h1>
    <p class="tagline">✦ Final Score ✦</p>
    <p style="font-size:52px;font-weight:900;color:#ff5533;text-shadow:3px 3px 0 #ffddcc">${score}</p>
    <p style="color:#b0a08a">Best: <strong>${best}</strong></p>
    <div style="display:flex;gap:12px;margin-top:8px">
      <button id="btnMouse"
        style="padding:12px 28px;font-size:15px;font-weight:800;font-family:Nunito,inherit;
               border:2.5px solid #ccc;border-radius:50px;background:#fff;
               color:#999;cursor:pointer">
        🖱️ Mouse / Touch
      </button>
      <button id="btnCamera"
        style="padding:12px 28px;font-size:15px;font-weight:800;font-family:Nunito,inherit;
               border:2.5px solid #ccc;border-radius:50px;background:#fff;
               color:#999;cursor:pointer">
        📷 Camera (Hand)
      </button>
    </div>
    <button id="startBtn" onclick="startGame()"
      style="margin-top:8px;padding:16px 52px;font-size:20px;font-weight:900;font-family:Nunito,inherit;
             border:none;border-radius:50px;background:linear-gradient(135deg,#ff7744,#ff3355);
             color:#fff;cursor:pointer;box-shadow:0 6px 0 #cc2233,0 10px 30px rgba(255,60,60,0.3)">
      Play Again!
    </button>
  `;
  // re-wire mode buttons in the new overlay HTML
  document.getElementById('btnMouse').addEventListener('click',  () => setMode('mouse'));
  document.getElementById('btnCamera').addEventListener('click', () => setMode('camera'));
  setMode(inputMode); // highlight whichever mode was last active
}

startBtn.addEventListener('click', startGame);

// ── MediaPipe ─────────────────────────────────────────────────────
const hands = new Hands({ locateFile: f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${f}` });
hands.setOptions({ maxNumHands:1, modelComplexity:1, minDetectionConfidence:0.5, minTrackingConfidence:0.5 });
hands.onResults(res => {
  if (inputMode !== 'camera') return; // only update from camera when in camera mode
  if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
    const tip = res.multiHandLandmarks[0][8];
    const nx = (1 - tip.x) * canvas.width;
    const ny = tip.y * canvas.height;
    prevFingerPos = fingerPos ? {...fingerPos} : null;
    fingerPos = {x:nx, y:ny};
    slashTrail.push({x:nx, y:ny});
    if (slashTrail.length > 8) slashTrail.shift();
  } else {
    fingerPos = null; prevFingerPos = null;
    if (slashTrail.length > 0) slashTrail.shift();
  }
});

// ── Mouse input (zero CPU cost) ───────────────────────────────────
canvas.addEventListener('mousemove', e => {
  if (!gameRunning || inputMode !== 'mouse') return;
  const rect = canvas.getBoundingClientRect();
  const nx = e.clientX - rect.left;
  const ny = e.clientY - rect.top;
  prevFingerPos = fingerPos ? {...fingerPos} : null;
  fingerPos = {x:nx, y:ny};
  slashTrail.push({x:nx, y:ny});
  if (slashTrail.length > 8) slashTrail.shift();
});
canvas.addEventListener('mouseleave', () => {
  if (inputMode !== 'mouse') return;
  fingerPos = null; prevFingerPos = null;
});

// ── Touch input ───────────────────────────────────────────────────
function handleTouch(e) {
  if (!gameRunning) return;
  resumeAudio();
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0] || e.changedTouches[0];
  const nx = touch.clientX - rect.left;
  const ny = touch.clientY - rect.top;
  prevFingerPos = fingerPos ? {...fingerPos} : null;
  fingerPos = {x:nx, y:ny};
  slashTrail.push({x:nx, y:ny});
  if (slashTrail.length > 8) slashTrail.shift();
}
canvas.addEventListener('touchstart', handleTouch, {passive:false});
canvas.addEventListener('touchmove',  e => { e.preventDefault(); handleTouch(e); }, {passive:false});
canvas.addEventListener('touchend', () => { fingerPos=null; prevFingerPos=null; }, {passive:true});
document.addEventListener('gesturestart', e => e.preventDefault(), {passive:false});
document.addEventListener('gesturechange', e => e.preventDefault(), {passive:false});

// ── Camera + MediaPipe (only when camera mode selected) ───────────
let camStarted = false;
async function startCamera() {
  if (camStarted) return;
  camStarted = true;
  statusBar.textContent = '📷 Starting camera…';
  try {
    const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:640,height:480}});
    webcam.srcObject = stream;
    webcam.style.opacity = '0.12';
    await new Promise(r => webcam.onloadedmetadata = r);
    webcam.play();
    statusBar.textContent = '✅ Camera ready — press Start!';
    let lastHandsFrame = 0, handsProcessing = false;
    const cam = new Camera(webcam, {
      onFrame: async () => {
        if (inputMode !== 'camera') return; // don't process if in mouse mode
        if (handsProcessing) return;
        const now = performance.now();
        if (now - lastHandsFrame < 100) return; // 10fps max
        lastHandsFrame = now;
        handsProcessing = true;
        try { await hands.send({image:webcam}); }
        finally { handsProcessing = false; }
      },
      width:640, height:480
    });
    cam.start();
  } catch(e) {
    statusBar.textContent = '❌ Camera unavailable';
    camStarted = false;
  }
}

document.getElementById('btnMouse').addEventListener('click',  () => setMode('mouse'));
document.getElementById('btnCamera').addEventListener('click', () => setMode('camera'));

bestEl.textContent = best;
setMode('mouse'); // default — mouse selected, no camera started
</script>
